<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<link rel="manifest" href="manifest.json">
<title>FocusFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {
  --bg: #FAFAF8;
  --card: #ffffff;
  --text: #1a1a1a;
  --text2: #666666;
  --text3: #999999;
  --must: #d94f4f;
  --border: #e8e8e8;
  --border-strong: #cccccc;
  --danger: #d94f4f;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
}
#screen-main  { display: flex; z-index: 10; }
#screen-group { z-index: 20; }
#screen-focus { z-index: 30; }
.screen.visible { display: flex; }

@keyframes slideInRight {
  from { transform: translateX(28px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
#screen-group.visible,
#screen-focus.visible { animation: slideInRight 0.22s ease-out; }

/* ── BACK BUTTON / HEADER ── */
.screen-header {
  display: flex;
  align-items: center;
  padding: 12px 16px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 56px;
  gap: 4px;
}
.back-btn {
  width: 44px; height: 44px;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--text);
  border-radius: 50%;
  transition: background 0.12s;
  flex-shrink: 0;
}
.back-btn:active { background: rgba(0,0,0,.07); }
.header-title {
  font-size: 17px; font-weight: 700; color: var(--text);
  flex: 1; min-width: 0;
}
.header-sub {
  font-size: 13px; color: var(--text2);
  flex-shrink: 0;
}

/* ── MAIN HEADER ── */
.main-header {
  padding: 12px 20px 10px;
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.app-title {
  font-weight: 900; font-size: 18px;
  color: var(--text); letter-spacing: -0.3px;
  line-height: 1; flex-shrink: 0;
}
.date-badge {
  font-size: 12px; color: var(--text2); flex: 1;
}
.version-badge {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; flex-shrink: 0;
}
.focus-step-start {
  width: 100%; height: 44px;
  background: transparent; color: var(--text);
  border: 2px solid var(--text); border-radius: 50px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.focus-step-start:active { opacity: 0.6; }

/* ── TIME BAR ── */
.time-bar-wrap {
  padding: 0 20px 22px;
  flex-shrink: 0;
}
.time-bar-label {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 8px;
}
.time-bar-remaining { font-size: 13px; color: var(--text2); }
.time-bar-remaining strong {
  font-size: 18px; font-weight: 700; color: var(--text);
}
.time-bar-total { font-size: 12px; color: var(--text3); }
.time-bar-track {
  height: 5px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.time-bar-fill {
  height: 100%; background: var(--text);
  border-radius: 3px; transition: width 0.4s ease;
}

/* ── SCROLL ── */
.scroll {
  flex: 1; overflow-y: auto;
  overscroll-behavior: contain;
}
.scroll::-webkit-scrollbar { display: none; }

/* ── GROUP ROWS (main) ── */
.group-rows { padding: 0 20px; }
.group-row {
  display: flex; align-items: center;
  padding: 22px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.12s;
  border-radius: 8px;
}
.group-row:last-child { border-bottom: none; }
.group-row:active { background: rgba(0,0,0,.04); }
.group-row.zero { cursor: default; }

.gr-label { flex: 1; }
.gr-title {
  font-size: 19px; font-weight: 900;
  color: var(--text); letter-spacing: -0.3px; line-height: 1.2;
}
.gr-title.must-color { color: var(--must); }
.group-row.zero .gr-title { color: var(--text3); }

.gr-est { font-size: 13px; color: var(--text2); margin-top: 3px; }

.gr-right { text-align: right; margin-right: 4px; }
.gr-count {
  font-size: 32px; font-weight: 900;
  color: var(--text); letter-spacing: -1px; line-height: 1;
}
.gr-count.must-color { color: var(--must); }
.group-row.zero .gr-count { color: var(--text3); }
.gr-unit { font-size: 13px; color: var(--text2); }

.gr-arrow {
  font-size: 22px; color: var(--text3);
  margin-left: 12px; flex-shrink: 0;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 64px 40px; text-align: center;
  color: var(--text2); gap: 12px;
}
.empty-state .icon { font-size: 52px; line-height: 1; }
.empty-state p { font-size: 16px; line-height: 1.9; }

/* ── TASK CARDS ── */
.task-list { padding: 16px 20px 40px; }
.swipe-container {
  position: relative; margin-bottom: 10px;
  border-radius: 0 12px 12px 0; overflow: hidden;
}
.delete-bg {
  position: absolute; inset: 0;
  background: var(--danger);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 24px;
  color: #fff; font-size: 14px; font-weight: 700;
}
.task-card {
  background: var(--card);
  border-left: 4px solid #dddddd;
  border-radius: 0 12px 12px 0;
  padding: 16px 16px 16px 18px;
  margin-bottom: 0;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: transform 0.3s ease;
  min-height: 64px;
  position: relative;
}
.task-card[data-urgency="must"] { border-left-color: var(--must); }
.task-card.done-card { opacity: 0.5; border-left-color: #dddddd; }
.task-card-body { flex: 1; min-width: 0; }
.task-card-title {
  font-size: 17px; font-weight: 500; line-height: 1.5;
  margin-bottom: 4px; word-break: break-word; color: var(--text);
}
.task-card.done-card .task-card-title {
  text-decoration: line-through; color: var(--text2);
}
.task-card-meta { font-size: 13px; color: var(--text2); }

.check-btn {
  width: 44px; height: 44px;
  border-radius: 50%; border: 2px solid var(--border-strong);
  background: none; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .15s; color: transparent;
}
.task-card.done-card .check-btn {
  background: var(--text); border-color: var(--text); color: var(--bg);
}

/* ── FOCUS SCREEN ── */
.focus-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 24px 32px; text-align: center;
  gap: 0;
}
.focus-task-title {
  font-size: 12px; font-weight: 500; color: var(--text2);
  margin-bottom: 12px; line-height: 1.4; word-break: break-word;
  max-width: 100%;
}
/* ステップ一覧ドロワー */
.step-list-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: flex-start;
}
.step-list-sheet {
  width: 100%; background: var(--bg);
  border-radius: 0 0 20px 20px;
  padding: 20px 24px 32px; max-height: 70vh; overflow-y: auto;
}
.step-list-title {
  font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text2); text-transform: uppercase;
  margin-bottom: 16px; text-align: center;
}
.step-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.step-list-item:last-child { border-bottom: none; }
.step-list-check {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 50%; border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.step-list-item.done .step-list-check {
  background: var(--text); border-color: var(--text); color: var(--bg);
}
.step-list-label {
  font-size: 16px; line-height: 1.45; color: var(--text);
}
.step-list-item.done .step-list-label {
  text-decoration: line-through; color: var(--text2);
}
.focus-step-widget {
  width: 100%; margin-bottom: 16px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 18px; padding: 16px 18px 14px; text-align: left;
}
.focus-step-counter {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: var(--text2); text-transform: uppercase; margin-bottom: 10px;
}
.focus-step-text {
  font-size: 24px; font-weight: 700; line-height: 1.4;
  color: var(--text); margin-bottom: 14px; word-break: break-word;
}
.focus-step-next {
  width: 100%; height: 44px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 50px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.focus-step-next:active { opacity: 0.8; }
.focus-step-done-msg {
  font-size: 15px; font-weight: 700; color: var(--text2);
  text-align: center; padding: 6px 0;
}
.timer-ring-wrap {
  position: relative;
  width: 180px; height: 180px;
  margin-bottom: 20px; flex-shrink: 0;
}
.timer-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  transition: background 0.6s linear;
}
.timer-inner {
  position: absolute;
  inset: 18px;
  background: var(--bg);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.timer-inner:active { opacity: 0.75; }
.timer-display {
  font-size: 44px; font-weight: 700; letter-spacing: 1px;
  line-height: 1; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.timer-display.urgent { color: var(--danger); }
.timer-hint {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text2); margin-top: 6px; text-transform: uppercase;
}
/* 進行方向矢印 SVG オーバーレイ */
.timer-arrow-svg {
  position: absolute; inset: 0;
  pointer-events: none; overflow: visible;
}

/* ── IMPORT BUTTON ── */
.import-wrap {
  padding: 8px 20px 12px;
  display: flex; justify-content: center;
  flex-shrink: 0;
}
.import-btn {
  height: 44px; padding: 0 24px;
  background: none; border: 1.5px solid var(--border-strong);
  border-radius: 50px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 500; color: var(--text2);
  transition: opacity 0.15s;
}
.import-btn:active { opacity: 0.6; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 20px; gap: 0;
}
.tab-btn {
  flex: 1; height: 44px; border: none; background: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text3);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.15s;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
.tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-content.visible { display: flex; }

/* ── ALL TASKS VIEW ── */
.urgency-section { padding: 0 20px; margin-top: 8px; }
.urgency-section-header {
  font-size: 19px; font-weight: 900;
  color: var(--text); letter-spacing: -0.3px; line-height: 1.2;
  padding: 20px 0 10px;
}
.urgency-section.must-section .urgency-section-header { color: var(--must); }
.urgency-section.want-section .urgency-section-header { color: var(--text); }
.urgency-section.nice-section .urgency-section-header { color: var(--text2); }
.urgency-section.drag-over { background: rgba(0,0,0,0.04); border-radius: 12px; }
.due-badge {
  display: inline-block;
  font-size: 15px; font-weight: 700;
  margin-top: 4px; line-height: 1.4;
}
.due-badge.overdue { color: var(--must); }
.due-badge.soon { color: #e67e22; }
.due-badge.normal { color: var(--text2); }
.all-task-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-left: 4px solid #ddd;
  border-radius: 0 12px 12px 0;
  padding: 14px 14px 14px 18px;
  margin-bottom: 0; min-height: 58px;
  position: relative;
  user-select: none; -webkit-user-select: none;
}
.delete-mode-active .all-task-card {
  border-left-color: #e74c3c !important;
  touch-action: pan-y;
}
.all-task-card[data-urgency="must"] { border-left-color: var(--must); }
.section-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
.drag-handle {
  font-size: 22px; color: var(--text3);
  padding: 14px 0 14px 14px; flex-shrink: 0;
  touch-action: none;
  cursor: grab;
  user-select: none; -webkit-user-select: none;
}
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 500;
  opacity: 0.88; border-radius: 0 12px 12px 0;
  box-shadow: 0 10px 28px rgba(0,0,0,0.18);
  transform: scale(1.02);
}

/* ── EDIT SCREEN ── */
.edit-section { padding: 20px 20px 0; }
.edit-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
}
.edit-task-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  line-height: 1.4; word-break: break-word;
}
.urgency-pills { display: flex; gap: 8px; }
.urgency-pill {
  flex: 1; height: 40px; border-radius: 50px;
  border: 1.5px solid var(--border-strong);
  background: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text2);
  transition: all 0.15s;
}
.urgency-pill.active-must { background: var(--must); border-color: var(--must); color: #fff; }
.urgency-pill.active-want { background: var(--text); border-color: var(--text); color: var(--bg); }
.urgency-pill.active-nice { background: var(--text2); border-color: var(--text2); color: var(--bg); }
.step-edit-list { display: flex; flex-direction: column; gap: 10px; }
.step-edit-item {
  display: flex; flex-direction: column; gap: 6px;
  background: var(--card); border-radius: 12px;
  padding: 14px 16px;
}
.step-edit-text {
  width: 100%; border: none; background: none; outline: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px; color: var(--text); line-height: 1.5;
}
.step-edit-text::placeholder { color: var(--text3); }
.step-edit-bottom {
  display: flex; align-items: center; gap: 6px;
  color: var(--text2); font-size: 13px;
}
.step-edit-mins {
  width: 44px; border: none; border-bottom: 1.5px solid var(--border-strong);
  background: none; outline: none; text-align: center;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; color: var(--text); padding: 2px 0;
}
.step-edit-del {
  margin-left: auto; border: none; background: none;
  cursor: pointer; color: var(--danger, #c0392b);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 700;
  padding: 4px 8px; min-height: 36px; border-radius: 6px;
}
.step-edit-del:active { background: rgba(192,57,43,0.1); }
.add-step-btn {
  width: 100%; height: 44px; border-radius: 10px;
  border: 1.5px dashed var(--border-strong);
  background: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; color: var(--text2);
  margin-top: 8px;
}
.edit-save-sticky {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  padding: 12px 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  margin-top: 24px;
}
.edit-save-btn {
  width: 100%; height: 50px; border-radius: 50px;
  border: none; background: var(--text); color: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
}

.edit-title-input {
  width: 100%; border: none; border-bottom: 1.5px solid var(--border-strong);
  background: none; outline: none; padding: 8px 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 18px; font-weight: 700; color: var(--text);
}
.edit-due-input {
  width: 100%; border: none; border-bottom: 1.5px solid var(--border-strong);
  background: none; outline: none; padding: 8px 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; color: var(--text);
  -webkit-appearance: none;
}

/* ── STEP DETAIL EDIT SCREEN ── */
.step-detail-text {
  width: 100%;
  min-height: 120px;
  border: none; background: none; outline: none; resize: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 20px; font-weight: 500; color: var(--text);
  line-height: 1.6; padding: 0;
}
.step-detail-text::placeholder { color: var(--text3); }
.step-detail-mins-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border-radius: 12px;
  padding: 16px 20px; margin-top: 20px;
}
.step-detail-mins {
  width: 64px; border: none; border-bottom: 2px solid var(--border-strong);
  background: none; outline: none; text-align: center;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 24px; font-weight: 700; color: var(--text); padding: 4px 0;
}
.step-detail-mins-label { font-size: 16px; color: var(--text2); }
.step-delete-btn {
  width: 100%; height: 50px; margin-top: 16px;
  border: 1.5px solid var(--danger, #c0392b); border-radius: 12px;
  background: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--danger, #c0392b);
}

/* ── STEP LIST CARD (edit screen) ── */
.step-list-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 12px;
  padding: 14px 16px; cursor: pointer;
}
.step-list-card-text { flex: 1; font-size: 16px; color: var(--text); line-height: 1.4; }
.step-list-card-meta { font-size: 13px; color: var(--text3); white-space: nowrap; }
.step-list-card-arrow { font-size: 20px; color: var(--text3); flex-shrink: 0; }

/* ── ACTION SHEET ── */
.action-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.45);
  display: none; align-items: flex-end;
}
.action-overlay.open { display: flex; }
.action-sheet {
  width: 100%; background: var(--bg);
  border-radius: 20px 20px 0 0;
  padding: 0 16px 36px;
}
.action-sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border-strong); margin: 10px auto 0;
}
.action-sheet-title {
  text-align: center; padding: 14px 16px 12px;
  font-size: 14px; color: var(--text2); line-height: 1.4;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
  font-weight: 500; word-break: break-word;
}
.action-btn {
  width: 100%; height: 54px;
  display: flex; align-items: center; gap: 12px;
  border: none; background: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px; color: var(--text);
  border-radius: 12px; padding: 0 16px;
}
.action-btn:active { background: var(--card); }
.action-btn.danger { color: #e74c3c; }
.action-urgency-row { display: flex; gap: 6px; padding: 4px 0 12px; }
.action-urgency-btn {
  flex: 1; height: 40px; border-radius: 50px;
  border: 1.5px solid var(--border-strong);
  background: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px; font-weight: 700; color: var(--text2);
}
.action-urgency-btn.cur-must { background: var(--must); border-color: var(--must); color: #fff; }
.action-urgency-btn.cur-want { background: var(--text); border-color: var(--text); color: var(--bg); }
.action-urgency-btn.cur-nice { background: var(--text2); border-color: var(--text2); color: var(--bg); }
.action-cancel {
  width: 100%; height: 54px; margin-top: 8px;
  background: var(--card); border-radius: 14px;
  border: none; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px; font-weight: 700; color: var(--text);
}
.action-section-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; padding: 4px 16px 6px;
}

.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text); border-radius: 50px; padding: 12px 22px;
  font-size: 14px; font-weight: 700; color: var(--bg);
  z-index: 400; transition: transform .3s cubic-bezier(.34,1.3,.64,1);
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════ SCREEN: MAIN ════ -->
<div class="screen" id="screen-main">
  <div class="main-header">
    <div class="app-title">FocusFlow</div>

  <div class="tab-content visible" id="tab-home">
    <div class="time-bar-wrap">

        <span class="time-bar-total" id="timeBarTotal">/ 0.0h</span>

        style="border:1.5px solid var(--border-strong);background:none;font-size:14px;font-weight:700;cursor:pointer;padding:4px 12px;border-radius:50px;color:var(--text3);font-family:'Noto Sans JP',sans-serif;transition:all .15s;">🗑 削除</button>
    </div>

</div>

<!-- ════ SCREEN: GROUP DETAIL ════ -->
<div class="screen" id="screen-group">
  <div class="screen-header">

  <div class="scroll">
    <div class="task-list" id="groupTaskList"></div>
  </div>
</div>

<!-- ════ SCREEN: FOCUS ════ -->
<div class="screen" id="screen-focus">
  <div class="screen-header">
    <button class="back-btn" onclick="goBack('focus')">‹</button>

  <div class="focus-body">

    <div class="timer-ring-wrap">

      <!-- ドットSVG：赤弧の先端(r=81、12時位置)に白ドットを置いて回転 -->

<!-- ════ SCREEN: STEP DETAIL EDIT ════ -->
<div class="screen" id="screen-step-edit" style="z-index:50;">

  <div class="scroll" style="padding: 24px 20px 0;">

<div class="toast" id="toast"></div>

<!-- ════ ACTION SHEET ════ -->
<div class="action-overlay" id="actionOverlay" onclick="closeActionSheet()">

      <button class="action-urgency-btn" id="aub-want" onclick="actionSetUrgency('want')">できたら</button>

<div class="screen" id="screen-edit" style="z-index:40;">

  </div>
  <div class="scroll" id="editScroll">

      <div class="edit-section-label">タイトル</div>
      <input class="edit-title-input" id="editTaskTitle" placeholder="タスクのタイトル">
    </div>

      <div class="edit-section-label">期日（任意）</div>
      <input class="edit-due-input" id="editDueDate" type="date">
    </div>
    <div class="edit-section" style="margin-top:20px;">
      <div class="edit-section-label">ステップ</div>
      <button class="add-step-btn" onclick="addEditStep()" style="margin-bottom:8px;">＋ ステップを追加</button>
      <div class="step-edit-list" id="stepEditList"></div>

      <button class="edit-save-btn" onclick="saveEdit()">保存</button>
    </div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────
// stepのラベル（新: text / 旧: title / 文字列）
function stepLabel(s) {
  if (typeof s === 'string') return s;
  return s.text || s.title || '';
}
// stepの見積もり分数
function stepMinutes(s) {
  if (!s || typeof s !== 'object') return 0;
  return s.estimatedMinutes || 0;
}
// タスク全体の見積もり（stepsの合計 or t.estimate）
function taskEstimate(t) {
  const fromSteps = (t.steps || []).reduce((sum, s) => sum + stepMinutes(s), 0);
  return fromSteps > 0 ? fromSteps : (t.estimate || 30);
}

// ─── MIGRATION ───────────────────────────────────────────────────
function migrateTasks(list) {
  const urgencyMap  = { must: 'must', want: 'want', idea: 'nice' };
  const priorityMap = { high: 'must', medium: 'want', low: 'nice' };
  return list.map(t => {
    if (!t.id) t.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    t.done    = t.done || false;
    t.urgency = t.urgency || urgencyMap[t.type] || priorityMap[t.priority] || 'want';
    // steps を内部フォーマット（text/done/estimatedMinutes）に統一
    t.steps = (t.steps || []).map(s => typeof s === 'string'
      ? { text: s, done: false, estimatedMinutes: 0 }
      : { text: s.text || s.title || '', done: s.done || false,
          estimatedMinutes: s.estimatedMinutes || 0 });
    t.estimate = taskEstimate(t);
    return t;
  });
}

// ─── VERSION ─────────────────────────────────────────────────────
const APP_VERSION = 'v4.1';

// ─── STATE ───────────────────────────────────────────────────────
let tasks = migrateTasks(JSON.parse(localStorage.getItem('ff-tasks') || '[]'));
let currentUrgency = null;
let focusId        = null;
let timerTotal     = 0;
let timerLeft      = 0;
let timerRunning   = false;
let timerTick      = null;

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const save = () => localStorage.setItem('ff-tasks', JSON.stringify(tasks));
const esc  = s => String(s||'').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// IDの重複を修復（LINE取り込みの衝突対策）
(function deduplicateIds() {
  const seen = new Set();
  let changed = false;
  tasks.forEach(t => {
    if (!t.id || seen.has(t.id)) {
      t.id = uid();
      changed = true;
    }
    seen.add(t.id);
  });
  if (changed) localStorage.setItem('ff-tasks', JSON.stringify(tasks));
})();

const GROUP_CONFIG = [
  { urgency: 'must', title: '今日中に絶対' },
  { urgency: 'want', title: 'できたらやりたい' },
  { urgency: 'nice', title: '余力があれば' },
];

// ─── TOAST ───────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── TIME BAR ────────────────────────────────────────────────────
function calcTimeBar() {
  const totalMin = tasks.reduce((s, t) => s + taskEstimate(t), 0);
  const remMin   = tasks.filter(t => !t.done).reduce((s, t) => s + taskEstimate(t), 0);
  const doneMin  = totalMin - remMin;
  document.getElementById('timeBarRemaining').textContent = (remMin / 60).toFixed(1);
  document.getElementById('timeBarTotal').textContent     = '/ ' + (totalMin / 60).toFixed(1) + 'h';
  document.getElementById('timeBarFill').style.width      =
    (totalMin > 0 ? Math.round(doneMin / totalMin * 100) : 0) + '%';
}

// ─── MAIN SCREEN ─────────────────────────────────────────────────
function renderMain() {
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });
  document.getElementById('versionBadge').textContent = APP_VERSION;
  calcTimeBar();

  const incomplete = tasks.filter(t => !t.done);
  const el = document.getElementById('mainGroups');

  if (!incomplete.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">✓</span><p>すべてのタスクが完了しました！</p></div>`;
    return;
  }

  let html = '';
  GROUP_CONFIG.forEach(({ urgency, title }) => {
    const list   = tasks.filter(t => !t.done && t.urgency === urgency);
    const count  = list.length;
    const estMin = list.reduce((s, t) => s + taskEstimate(t), 0);
    const estStr = count > 0
      ? (estMin >= 60 ? (estMin / 60).toFixed(1) + 'h' : estMin + '分')
      : '';
    const zeroClass  = count === 0 ? ' zero' : '';
    const mustClass  = urgency === 'must' && count > 0 ? ' must-color' : '';
    const clickAttr  = count > 0 ? `onclick="showGroup('${urgency}')"` : '';

    html += `
    <div class="group-row${zeroClass}" ${clickAttr}>
      <div class="gr-label">
        <div class="gr-title${mustClass}">${title}</div>
        ${estStr ? `<div class="gr-est">${estStr}</div>` : ''}
      </div>
      <div class="gr-right">
        <div class="gr-count${mustClass}">${count}</div>
        <div class="gr-unit">件</div>
      </div>
      ${count > 0 ? '<div class="gr-arrow">›</div>' : ''}
    </div>`;
  });

  el.innerHTML = html;
}

// ─── GROUP DETAIL ─────────────────────────────────────────────────
function showGroup(urgency) {
  currentUrgency = urgency;
  const cfg = GROUP_CONFIG.find(g => g.urgency === urgency);
  const list = tasks.filter(t => !t.done && t.urgency === urgency);

  const estMin = list.reduce((s, t) => s + taskEstimate(t), 0);
  const estStr = estMin >= 60 ? (estMin / 60).toFixed(1) + 'h' : estMin + '分';

  document.getElementById('groupHeaderTitle').textContent = cfg.title;
  document.getElementById('groupHeaderSub').textContent   = list.length > 0 ? estStr : '';

  renderGroupList();
  document.getElementById('screen-group').classList.add('visible');
}

function renderGroupList() {
  const undone = tasks.filter(t => !t.done && t.urgency === currentUrgency);
  const done   = tasks.filter(t =>  t.done && t.urgency === currentUrgency);
  const list   = [...undone, ...done];
  const el     = document.getElementById('groupTaskList');

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><p>タスクがありません</p></div>`;
    return;
  }
  el.innerHTML = list.map(taskCardHTML).join('');
  addSwipeListeners();
}

function taskCardHTML(t) {
  const doneClass = t.done ? ' done-card' : '';
  const bodyClick = t.done ? '' : `onclick="selectTask('${t.id}')"`;
  return `<div class="swipe-container" data-id="${t.id}">
    <div class="delete-bg">削除</div>
    <div class="task-card${doneClass}" data-urgency="${t.urgency || 'want'}">
      <div class="task-card-body" ${bodyClick} style="flex:1;min-width:0;cursor:${t.done ? 'default' : 'pointer'};">
        <div class="task-card-title">${esc(t.title)}</div>
        <div class="task-card-meta">${taskEstimate(t)}分</div>
      </div>
      <button class="check-btn" onclick="toggleDone('${t.id}')">${t.done ? '✓' : ''}</button>
    </div>
  </div>`;
}

function addSwipeListeners() {
  document.querySelectorAll('#groupTaskList .swipe-container').forEach(container => {
    const card = container.querySelector('.task-card');
    let startX = 0, currentX = 0;

    container.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      currentX = startX;
      card.style.transition = 'none';
    }, { passive: true });

    container.addEventListener('touchmove', e => {
      currentX = e.touches[0].clientX;
      const dx = Math.min(0, currentX - startX);
      card.style.transform = `translateX(${Math.max(dx, -100)}px)`;
    }, { passive: true });

    container.addEventListener('touchend', () => {
      const dx = currentX - startX;
      if (dx < -72) {
        card.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
        card.style.transform = 'translateX(-100%)';
        card.style.opacity = '0';
        const id = container.dataset.id;
        setTimeout(() => deleteTask(id), 210);
      } else {
        card.style.transition = 'transform 0.3s ease';
        card.style.transform = 'translateX(0)';
      }
    });
  });
}

// ─── TASK ACTIONS ─────────────────────────────────────────────────
function selectTask(id) {
  startFocus(id);
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderMain();
  if (currentUrgency) renderGroupList();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();
  renderMain();
  if (currentUrgency) renderGroupList();
}

function addTask(t) {
  tasks.unshift({ id: uid(), done: false, steps: [], createdAt: new Date().toISOString(), ...t });
  save();
}

// ─── FOCUS MODE ───────────────────────────────────────────────────
function startFocus(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  focusId = id;
  stopTimer();

  document.getElementById('timerHint').textContent = 'タップで開始';
  document.getElementById('focusTaskTitle').textContent = t.title;

  // スモールステップ描画（1件ずつ）
  renderCurrentStep();

  // 最初の未完了ステップの estimatedMinutes をタイマーにセット、なければタスク全体の見積もり
  const firstStep = (t.steps || []).find(s => !s.done);
  const mins = (firstStep && stepMinutes(firstStep) > 0) ? stepMinutes(firstStep) : taskEstimate(t);
  timerTotal = mins * 60;
  timerLeft  = timerTotal;
  updateTimerUI();
  document.getElementById('screen-focus').classList.add('visible');
}

function renderCurrentStep() {
  const widget = document.getElementById('focusStepWidget');
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps || t.steps.length === 0) {
    widget.style.display = 'none';
    return;
  }
  const steps = t.steps;
  const total = steps.length;
  // 最初の未完了ステップを探す
  const idx = steps.findIndex(s => !s.done);
  widget.style.display = 'block';

  if (idx === -1) {
    // 全ステップ完了
    widget.innerHTML = `<div class="focus-step-done-msg">✓ すべてのステップ完了</div>`;
    return;
  }
  const step = steps[idx];
  const label = stepLabel(step);
  const mins  = stepMinutes(step);
  const doneCount = steps.filter(s => s.done).length;
  const metaStr = mins > 0 ? `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">${mins}分</div>` : '';
  const btn = timerRunning
    ? `<button class="focus-step-next" onclick="advanceStep()">完了</button>`
    : `<button class="focus-step-start" onclick="startStep()">スタート</button>`;
  widget.innerHTML = `
    <div class="focus-step-counter" onclick="showStepList()" style="cursor:pointer">
      ステップ ${doneCount + 1} / ${total} &#8250;
    </div>
    <div class="focus-step-text">${esc(label)}</div>
    ${metaStr}
    ${btn}`;
}

function showStepList() {
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps) return;
  const items = t.steps.map((s, i) => {
    const done  = typeof s === 'object' ? (s.done || false) : false;
    const label = stepLabel(s);
    const mins  = stepMinutes(s);
    const minsStr = mins > 0 ? `<span style="font-size:12px;color:var(--text3);margin-left:6px;">${mins}分</span>` : '';
    return `<div class="step-list-item${done ? ' done' : ''}"
      style="cursor:pointer;"
      onclick="document.querySelector('.step-list-overlay').remove();openStepDetailFrom('${t.id}',${i})">
      <div class="step-list-check">${done ? '✓' : ''}</div>
      <div class="step-list-label" style="flex:1;">${esc(label)}${minsStr}</div>
      <div style="font-size:18px;color:var(--text3);padding-left:8px;">›</div>
    </div>`;
  }).join('');
  const overlay = document.createElement('div');
  overlay.className = 'step-list-overlay';
  overlay.innerHTML = `<div class="step-list-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div class="step-list-title" style="margin-bottom:0;">すべてのステップ</div>
      <button onclick="document.querySelector('.step-list-overlay').remove();openEditScreen('${t.id}')"
        style="border:none;background:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;padding:4px 8px;">＋追加</button>
    </div>
    ${items}
  </div>`;
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
  document.body.appendChild(overlay);
}

function startStep() {
  if (!timerRunning) toggleTimer(); // タイマースタート
  renderCurrentStep();              // ボタンを「完了」に切り替え
}

function advanceStep() {
  stopTimer();
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps) return;
  const idx = t.steps.findIndex(s => !s.done);
  if (idx === -1) return;
  t.steps[idx].done = true;
  save();
  // 全ステップ完了なら自動でタスク完了
  if (t.steps.every(s => s.done)) {
    renderCurrentStep();
    setTimeout(() => completeTask(), 800);
  } else {
    // 次のステップの estimatedMinutes をタイマーにセット
    const nextStep = t.steps.find(s => !s.done);
    const mins = (nextStep && stepMinutes(nextStep) > 0) ? stepMinutes(nextStep) : taskEstimate(t);
    timerTotal = mins * 60;
    timerLeft  = timerTotal;
    updateTimerUI();
    renderCurrentStep(); // 次のステップを「スタート」ボタンで表示
  }
}

function completeTask() {
  if (focusId) {
    const t = tasks.find(t => t.id === focusId);
    if (t) { t.done = true; save(); toast('✓ タスク完了！'); }
  }
  stopTimer();
  document.getElementById('screen-focus').classList.remove('visible');
  document.getElementById('screen-group').classList.remove('visible');
  focusId = null;
  currentUrgency = null;
  renderMain();
}

function goBack(from) {
  if (from === 'focus') {
    stopTimer();
    document.getElementById('screen-focus').classList.remove('visible');
    focusId = null;
  } else if (from === 'group') {
    document.getElementById('screen-group').classList.remove('visible');
    currentUrgency = null;
    renderMain();
  }
}

// ─── TIMER ────────────────────────────────────────────────────────
function stopTimer() {
  clearInterval(timerTick);
  timerRunning = false;
}

function toggleTimer() {
  const hint = document.getElementById('timerHint');
  if (timerRunning) {
    stopTimer();
    hint.textContent = 'タップで再開';
  } else {
    if (timerLeft <= 0) timerLeft = timerTotal;
    timerRunning = true;
    hint.textContent = 'タップで一時停止';
    timerTick = setInterval(() => {
      timerLeft--;
      updateTimerUI();
      if (timerLeft <= 0) {
        stopTimer();
        hint.textContent = 'タップで開始';
        toast('⏰ 時間になりました！');
      }
    }, 1000);
  }
}

function updateTimerUI() {
  const m   = Math.floor(timerLeft / 60), s = timerLeft % 60;
  const pct = timerTotal > 0 ? (timerLeft / timerTotal * 100) : 0;
  const urgent = timerLeft <= 60 && timerLeft > 0;
  const color  = urgent ? 'var(--danger)' : '#e8553a';
  const track  = '#e8e4de';

  const el = document.getElementById('timerDisplay');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className   = 'timer-display' + (urgent ? ' urgent' : '');

  // 経過分をgray、残り分をredにすることでドットが時計回りに動く
  const elapsed = 100 - pct;
  document.getElementById('timerRing').style.background =
    `conic-gradient(${track} ${elapsed}%, ${color} ${elapsed}%)`;

  const dot = document.getElementById('timerDot');
  if (dot) {
    dot.setAttribute('transform', `rotate(${elapsed * 3.6},90,90)`);
    dot.style.opacity = pct > 1 ? '1' : '0';
  }
}

// ─── ALL TASKS VIEW ───────────────────────────────────────────────
const URGENCY_LABELS = { must: '今日中に絶対', want: 'できたらやりたい', nice: '余力があれば' };

function formatDueDate(dateStr) {
  if (!dateStr) return null;
  const due = new Date(dateStr);
  if (isNaN(due)) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dueDay = new Date(due.getFullYear(), due.getMonth(), due.getDate());
  const diffDays = Math.round((dueDay - today) / 86400000);
  const days = ['日','月','火','水','木','金','土'];
  const label = `${due.getMonth()+1}/${due.getDate()}（${days[due.getDay()]}）`;
  if (diffDays < 0) return { label: `${label} 期限切れ`, cls: 'overdue' };
  if (diffDays === 0) return { label: `今日まで`, cls: 'overdue' };
  if (diffDays === 1) return { label: `明日まで`, cls: 'normal' };
  return { label: `${label}まで`, cls: 'normal' };
}

function renderTimeline() {
  const container = document.getElementById('timelineContainer');
  const withDue = tasks.filter(t => !t.done && t.dueDate);
  if (!withDue.length) { container.style.display = 'none'; return; }
  container.style.display = 'block';

  const today = new Date(); today.setHours(0,0,0,0);
  const groups = {};
  withDue.forEach(t => {
    const d = new Date(t.dueDate); d.setHours(0,0,0,0);
    const days = Math.round((d - today) / 86400000);
    if (!groups[t.dueDate]) groups[t.dueDate] = { days, count: 0, hasMust: false };
    groups[t.dueDate].count++;
    if (t.urgency === 'must') groups[t.dueDate].hasMust = true;
  });

  const dayVals = Object.values(groups).map(g => g.days);
  const minDay = Math.min(0, ...dayVals);
  const maxDay = Math.max(14, ...dayVals) + 2;
  const range  = maxDay - minDay;

  const W = 320, padL = 24, padR = 24, lineW = W - padL - padR;
  const lineY = 44;
  const H = 90;
  const xOf = d => padL + ((d - minDay) / range) * lineW;
  const todayX = xOf(0);

  // x座標順にソートしてラベル重なりを防ぐ
  const sorted = Object.entries(groups).sort((a, b) => a[1].days - b[1].days);
  const MIN_SPACING = 46;
  let lastLabelX = todayX; // 「今日」ラベルの位置を起点に

  const markers = sorted.map(([, g]) => {
    const x = xOf(g.days);
    const isOverdue = g.days < 0;
    const color = (isOverdue || g.hasMust) ? '#e74c3c' : '#aaa';
    const r = Math.max(9, Math.min(16, 9 + g.count - 1));
    const daysLabel = isOverdue ? `期限切れ`
      : g.days === 1 ? `明日`
      : `${g.days}日`;
    const canShowLabel = g.days !== 0 && Math.abs(x - lastLabelX) >= MIN_SPACING;
    if (canShowLabel) lastLabelX = x;
    return `
      <circle cx="${x}" cy="${lineY}" r="${r}" fill="${color}"/>
      <text x="${x}" y="${lineY}" text-anchor="middle" dominant-baseline="middle"
        font-size="${r >= 12 ? 12 : 10}" fill="white" font-weight="700">${g.count}</text>
      ${canShowLabel ? `<text x="${x}" y="${lineY + r + 14}" text-anchor="middle" font-size="13" fill="${color}" font-weight="500">${daysLabel}</text>` : ''}`;
  }).join('');

  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;display:block;">
      <line x1="${padL}" y1="${lineY}" x2="${W-padR}" y2="${lineY}" stroke="var(--border-strong)" stroke-width="2"/>
      <circle cx="${todayX}" cy="${lineY}" r="5" fill="var(--text)"/>
      <text x="${todayX}" y="${lineY + 19}" text-anchor="middle" font-size="13" fill="var(--text2)" font-weight="500">今日</text>
      ${markers}
    </svg>`;
}

function renderAllTasks() {
  renderTimeline();
  const el = document.getElementById('allTasksScroll');
  const html = ['must','want','nice'].map(urgency => {
    const list = tasks.filter(t => !t.done && t.urgency === urgency);
    const cards = list.length
      ? list.map(t => {
          const due = formatDueDate(t.dueDate);
          const dueBadge = due
            ? `<div class="due-badge ${due.cls}">${due.label}</div>`
            : '';
        return `<div class="all-task-card" data-id="${t.id}" data-urgency="${urgency}" onclick="if(!deleteMode)openEditScreen('${t.id}')">
            <div style="flex:1;min-width:0;">
              <div style="font-size:16px;font-weight:500;color:var(--text);line-height:1.4;word-break:break-word;">${esc(t.title)}</div>
              ${dueBadge}
              <div style="font-size:12px;color:var(--text3);margin-top:2px;">${taskEstimate(t)}分</div>
            </div>
            <div class="drag-handle" onclick="event.stopPropagation()">⠿</div>
          </div>`;
        }).join('')
      : `<div style="padding:10px 0 4px;color:var(--text3);font-size:13px;">タスクなし</div>`;
    return `<div class="urgency-section ${urgency}-section" data-urgency="${urgency}">
      <div class="urgency-section-header">${URGENCY_LABELS[urgency]}</div>
      <div class="section-cards" data-urgency="${urgency}">${cards}</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="padding-bottom:40px;">${html}</div>`;
  addDragListeners();
}

let drag = null; // { id, ghost, offsetY }

// ─── DELETE MODE ──────────────────────────────────────────────────
let deleteMode = false;

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  const btn = document.getElementById('deleteModeBtn');
  const scroll = document.getElementById('allTasksScroll');
  btn.style.color      = deleteMode ? '#fff' : 'var(--text3)';
  btn.style.background = deleteMode ? '#e74c3c' : 'none';
  btn.style.borderColor= deleteMode ? '#e74c3c' : 'var(--border-strong)';
  scroll.classList.toggle('delete-mode-active', deleteMode);
  if (deleteMode) {
    addDeleteSwipeListeners();
    toast('右スワイプでタスクを削除');
  } else {
    toast('削除モードを終了');
  }
}

function addDeleteSwipeListeners() {
  document.querySelectorAll('#allTasksScroll .all-task-card').forEach(card => {
    if (card.dataset.swipeListened) return;
    card.dataset.swipeListened = '1';
    let startX = 0, startY = 0, curX = 0, swiping = false;

    card.addEventListener('touchstart', e => {
      if (!deleteMode) return;
      startX = curX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      swiping = false;
      card.style.transition = 'none';
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!deleteMode) return;
      curX = e.touches[0].clientX;
      const dx = curX - startX;
      const dy = Math.abs(e.touches[0].clientY - startY);
      if (dx > 8 && dx > dy) {
        swiping = true;
        card.style.transform = `translateX(${Math.min(dx, 120)}px)`;
      }
    }, { passive: true });

    card.addEventListener('touchend', () => {
      if (!deleteMode) return;
      const dx = curX - startX;
      if (swiping && dx > 72) {
        document.addEventListener('click', e => e.stopPropagation(), { capture: true, once: true });
        card.style.transition = 'transform .2s ease, opacity .2s ease';
        card.style.transform = 'translateX(110%)';
        card.style.opacity = '0';
        setTimeout(() => deleteTask(card.dataset.id), 210);
      } else {
        card.style.transition = 'transform .3s ease';
        card.style.transform = 'translateX(0)';
      }
    });
  });
}

// ─── ACTION SHEET ─────────────────────────────────────────────────
function getTargetUrgency(touchY) {
  const want = document.querySelector('#allTasksScroll .want-section');
  const nice = document.querySelector('#allTasksScroll .nice-section');
  if (!want || !nice) return null;
  const wantTop = want.getBoundingClientRect().top;
  const niceTop = nice.getBoundingClientRect().top;
  if (touchY < wantTop) return 'must';
  if (touchY >= niceTop) return 'nice';
  return 'want';
}

function addDragListeners() {
  // ⠿ ドラッグで優先度変更
  document.querySelectorAll('#allTasksScroll .drag-handle').forEach(handle => {
    const card = handle.closest('.all-task-card');
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      startDrag(card, e.touches[0]);
    }, { passive: false });
    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      if (drag) moveDrag(e.touches[0]);
    }, { passive: false });
    handle.addEventListener('touchend', e => {
      if (drag) endDrag(e.changedTouches[0]);
    });
  });
}

let actionTaskId = null;

function openActionSheet(id) {
  actionTaskId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('actionTitle').textContent = t.title;
  ['must','want','nice'].forEach(u => {
    const btn = document.getElementById('aub-' + u);
    btn.className = 'action-urgency-btn' + (t.urgency === u ? ' cur-' + u : '');
  });
  document.getElementById('actionOverlay').classList.add('open');
}

function closeActionSheet() {
  document.getElementById('actionOverlay').classList.remove('open');
  actionTaskId = null;
}

function actionEdit() {
  const id = actionTaskId;
  closeActionSheet();
  openEditScreen(id);
}

function actionDelete() {
  const id = actionTaskId;
  closeActionSheet();
  deleteTask(id);
}

function actionSetUrgency(urgency) {
  const t = tasks.find(t => t.id === actionTaskId);
  if (!t) return;
  t.urgency = urgency;
  save(); renderMain(); renderAllTasks();
  closeActionSheet();
  toast('優先度を変更しました');
}

function addDragListeners() {
  document.querySelectorAll('#allTasksScroll .drag-handle').forEach(handle => {
    const card = handle.closest('.all-task-card');

    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      startDrag(card, e.touches[0]);
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      if (drag) moveDrag(e.touches[0]);
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (drag) endDrag(e.changedTouches[0]);
    });
  });
}



function startDrag(card, touch) {
  const rect = card.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.style.cssText = `width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;`;
  ghost.innerHTML = card.innerHTML;
  ghost.style.background = 'var(--card)';
  ghost.style.padding = '14px 14px 14px 18px';
  ghost.style.display = 'flex';
  ghost.style.alignItems = 'center';
  ghost.style.borderLeft = `4px solid ${card.dataset.urgency === 'must' ? 'var(--must)' : '#ddd'}`;
  document.body.appendChild(ghost);
  card.style.opacity = '0.3';
  drag = { id: card.dataset.id, ghost, card, offsetY: touch.clientY - rect.top };
}

function moveDrag(touch) {
  if (!drag) return;
  drag.ghost.style.top = (touch.clientY - drag.offsetY) + 'px';
  const target = getTargetUrgency(touch.clientY);
  document.querySelectorAll('#allTasksScroll .urgency-section').forEach(sec => {
    sec.classList.toggle('drag-over', sec.dataset.urgency === target);
  });
}

function endDrag(touch) {
  if (!drag) return;
  drag.ghost.remove();
  drag.card.style.opacity = '';
  document.querySelectorAll('#allTasksScroll .urgency-section').forEach(sec => sec.classList.remove('drag-over'));
  const targetUrgency = getTargetUrgency(touch.clientY);
  if (targetUrgency) {
    const t = tasks.find(t => t.id === drag.id);
    if (t && t.urgency !== targetUrgency) {
      t.urgency = targetUrgency;
      save(); renderMain(); renderAllTasks();
      toast('優先度を変更しました');
    }
  }
  drag = null;
}

// ─── EDIT SCREEN ─────────────────────────────────────────────────
let editId = null;

function openEditScreen(id) {
  editId = id;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('editTaskTitle').value = t.title || '';
  document.getElementById('editDueDate').value = t.dueDate || '';
  renderEditSteps(t.steps || []);
  document.getElementById('screen-edit').classList.add('visible');
}

function closeEditScreen() {
  document.getElementById('screen-edit').classList.remove('visible');
  editId = null;
}

function renderEditSteps(steps) {
  const el = document.getElementById('stepEditList');
  if (!steps.length) {
    el.innerHTML = `<div style="color:var(--text3);font-size:14px;padding:8px 0;">ステップがありません</div>`;
    return;
  }
  el.innerHTML = steps.map((s, i) => {
    const text = stepLabel(s) || '（未入力）';
    const mins = stepMinutes(s);
    return `<div class="step-list-card" onclick="openStepDetail(${i})">
      <div class="step-list-card-text">${esc(text)}</div>
      ${mins ? `<div class="step-list-card-meta">${mins}分</div>` : ''}
      <div class="step-list-card-arrow">›</div>
    </div>`;
  }).join('');
}

function addEditStep() {
  const t = tasks.find(t => t.id === editId);
  if (!t) return;
  t.steps.push({ text: '', done: false, estimatedMinutes: 0 });
  save();
  renderEditSteps(t.steps);
  openStepDetail(t.steps.length - 1);
}

// ─── STEP DETAIL EDIT ────────────────────────────────────────────
let editStepIdx = null;
let stepDetailFromSheet = false;

function openStepDetailFrom(taskId, idx) {
  stepDetailFromSheet = true;
  editId = taskId;
  const t = tasks.find(t => t.id === taskId);
  if (t) renderEditSteps(t.steps || []);
  openStepDetail(idx);
}

function openStepDetail(idx) {
  const t = tasks.find(t => t.id === editId);
  if (!t) return;
  editStepIdx = idx;
  const s = t.steps[idx];
  document.getElementById('stepDetailText').value = stepLabel(s) || '';
  document.getElementById('stepDetailMins').value = stepMinutes(s) || '';
  document.getElementById('screen-step-edit').classList.add('visible');
  setTimeout(() => document.getElementById('stepDetailText').focus(), 100);
}

function closeStepDetail() {
  document.getElementById('screen-step-edit').classList.remove('visible');
  editStepIdx = null;
  if (stepDetailFromSheet) {
    stepDetailFromSheet = false;
    showStepList();
  }
}

function saveStepDetail() {
  const t = tasks.find(t => t.id === editId);
  if (!t || editStepIdx === null) return;
  const text = document.getElementById('stepDetailText').value.trim();
  const mins = parseInt(document.getElementById('stepDetailMins').value) || 0;
  const existing = t.steps[editStepIdx];
  t.steps[editStepIdx] = { text, done: existing ? existing.done : false, estimatedMinutes: mins };
  if (!text) t.steps.splice(editStepIdx, 1); // 空なら削除
  t.estimate = t.steps.reduce((sum, s) => sum + (s.estimatedMinutes || 0), 0) || t.estimate;
  save();
  renderEditSteps(t.steps);
  closeStepDetail();
  toast('✓ 保存しました');
}

function deleteFromStepDetail() {
  const t = tasks.find(t => t.id === editId);
  if (!t || editStepIdx === null) return;
  t.steps.splice(editStepIdx, 1);
  save();
  renderEditSteps(t.steps);
  closeStepDetail();
}

function deleteEditStep(idx) {
  const t = tasks.find(t => t.id === editId);
  if (!t) return;
  t.steps.splice(idx, 1);
  save();
  renderEditSteps(t.steps);
}

function saveEdit() {
  const t = tasks.find(t => t.id === editId);
  if (!t) return;
  const newTitle = document.getElementById('editTaskTitle').value.trim();
  if (newTitle) t.title = newTitle;
  const newDue = document.getElementById('editDueDate').value;
  if (newDue) t.dueDate = newDue; else delete t.dueDate;
  t.estimate = t.steps.reduce((sum, s) => sum + (s.estimatedMinutes || 0), 0) || t.estimate;
  save();
  renderMain();
  if (currentTab === 'all') renderAllTasks();
  closeEditScreen();
  toast('✓ 保存しました');
}

// クォート正規化（アプリ版Claude対策）
function normalizeQuotes(text) {
  return text
    .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036\uFF02]/g, '"')
    .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035\uFF07]/g, "'")
    .trim();
}

// LINEボットから自動取り込む
async function importFromLine() {
  try {
    const res = await fetch('https://divine-wildflower-8952.piinatsu123.workers.dev/tasks');
    const newTasks = await res.json();
    if (!newTasks || newTasks.length === 0) return;
    newTasks.forEach(t => {
      const steps = (t.steps || []).map(s => typeof s === 'string'
        ? { text: s, done: false, estimatedMinutes: 0 }
        : { text: s.text || s.title || '', done: s.done || false,
            estimatedMinutes: s.estimatedMinutes || 0 });
      const urgency = t.urgency || 'want';
      const fromSteps = steps.reduce((sum, s) => sum + (s.estimatedMinutes || 0), 0);
      const estimate = fromSteps > 0 ? fromSteps : (t.estimate || 30);
      const { id, ...rest } = t; // IDは捨てて uid() で新規発行
      addTask({ ...rest, urgency, estimate, steps, done: false });
    });
    await fetch('https://divine-wildflower-8952.piinatsu123.workers.dev/tasks', { method: 'DELETE' });
    renderMain();
    toast('✓ ' + newTasks.length + '件のタスクをLINEから取り込みました');
  } catch (e) {
    // サイレントに失敗（自動実行なのでエラー表示しない）
  }
}

// アプリを開いたとき・フォアグラウンドに戻ったとき自動チェック
importFromLine();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') importFromLine();
});

// クリップボードからインポート（ボタン押下時）
async function importFromClipboard() {
  // 1. クリップボードを試みる
  let text = '';
  try { text = await navigator.clipboard.readText(); } catch { /* 権限なし → promptへ */ }

  // 2. クリップボードの内容がJSONでなければpromptにフォールバック
  let parsed;
  try {
    parsed = JSON.parse(normalizeQuotes(text));
  } catch {
    text = prompt('JSONを貼り付けてください：');
    if (!text) return;
    text = text.trim();
    try {
      parsed = JSON.parse(normalizeQuotes(text));
    } catch {
      alert('JSONとして読み込めませんでした。');
      return;
    }
  }

  if (!Array.isArray(parsed) || parsed.length === 0) {
    alert('インポートできるタスクがありませんでした。');
    return;
  }

  const urgMap = { must: 'must', want: 'want', idea: 'nice' };
  const priMap = { high: 'must', medium: 'want', low: 'nice' };
  parsed.forEach(t => {
    // steps を内部フォーマット（text/done/estimatedMinutes）に統一
    const steps = (t.steps || []).map(s => typeof s === 'string'
      ? { text: s, done: false, estimatedMinutes: 0 }
      : { text: s.text || s.title || '', done: s.done || false,
          estimatedMinutes: s.estimatedMinutes || 0 });
    const urgency = t.urgency || urgMap[t.type] || priMap[t.priority] || 'want';
    // stepsに見積もりがあればその合計、なければ t.estimate or 30
    const fromSteps = steps.reduce((sum, s) => sum + (s.estimatedMinutes || 0), 0);
    const estimate  = fromSteps > 0 ? fromSteps : (t.estimate || 30);
    addTask({ ...t, urgency, estimate, steps, done: false });
  });
  renderMain();
  toast('✓ ' + parsed.length + '件のタスクをインポートしました');
}
