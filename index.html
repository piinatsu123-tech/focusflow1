<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<link rel="manifest" href="manifest.json">
<title>FocusFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

:root {
  --bg: #FAFAF8;
  --card: #ffffff;
  --text: #1a1a1a;
  --text2: #666666;
  --text3: #999999;
  --must: #d94f4f;
  --border: #e8e8e8;
  --border-strong: #cccccc;
  --danger: #d94f4f;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
}
#screen-main  { display: flex; z-index: 10; }
#screen-group { z-index: 20; }
#screen-focus { z-index: 30; }
.screen.visible { display: flex; }

@keyframes slideInRight {
  from { transform: translateX(28px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
#screen-group.visible,
#screen-focus.visible { animation: slideInRight 0.22s ease-out; }

/* ── BACK BUTTON / HEADER ── */
.screen-header {
  display: flex;
  align-items: center;
  padding: 12px 16px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 56px;
  gap: 4px;
}
.back-btn {
  width: 44px; height: 44px;
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--text);
  border-radius: 50%;
  transition: background 0.12s;
  flex-shrink: 0;
}
.back-btn:active { background: rgba(0,0,0,.07); }
.header-title {
  font-size: 17px; font-weight: 700; color: var(--text);
  flex: 1; min-width: 0;
}
.header-sub {
  font-size: 13px; color: var(--text2);
  flex-shrink: 0;
}

/* ── MAIN HEADER ── */
.main-header {
  padding: 28px 20px 14px;
  flex-shrink: 0;
}
.app-title {
  font-weight: 900; font-size: 30px;
  color: var(--text); letter-spacing: -0.5px;
  line-height: 1;
}
.date-badge {
  font-size: 13px; color: var(--text2); margin-top: 5px;
}
.version-badge {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; margin-top: 2px;
}
.focus-step-start {
  width: 100%; height: 44px;
  background: transparent; color: var(--text);
  border: 2px solid var(--text); border-radius: 50px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.focus-step-start:active { opacity: 0.6; }

/* ── TIME BAR ── */
.time-bar-wrap {
  padding: 0 20px 22px;
  flex-shrink: 0;
}
.time-bar-label {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 8px;
}
.time-bar-remaining { font-size: 13px; color: var(--text2); }
.time-bar-remaining strong {
  font-size: 18px; font-weight: 700; color: var(--text);
}
.time-bar-total { font-size: 12px; color: var(--text3); }
.time-bar-track {
  height: 5px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.time-bar-fill {
  height: 100%; background: var(--text);
  border-radius: 3px; transition: width 0.4s ease;
}

/* ── SCROLL ── */
.scroll {
  flex: 1; overflow-y: auto;
  overscroll-behavior: contain;
}
.scroll::-webkit-scrollbar { display: none; }

/* ── GROUP ROWS (main) ── */
.group-rows { padding: 0 20px; }
.group-row {
  display: flex; align-items: center;
  padding: 22px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.12s;
  border-radius: 8px;
}
.group-row:last-child { border-bottom: none; }
.group-row:active { background: rgba(0,0,0,.04); }
.group-row.zero { cursor: default; }

.gr-label { flex: 1; }
.gr-title {
  font-size: 19px; font-weight: 900;
  color: var(--text); letter-spacing: -0.3px; line-height: 1.2;
}
.gr-title.must-color { color: var(--must); }
.group-row.zero .gr-title { color: var(--text3); }

.gr-est { font-size: 13px; color: var(--text2); margin-top: 3px; }

.gr-right { text-align: right; margin-right: 4px; }
.gr-count {
  font-size: 32px; font-weight: 900;
  color: var(--text); letter-spacing: -1px; line-height: 1;
}
.gr-count.must-color { color: var(--must); }
.group-row.zero .gr-count { color: var(--text3); }
.gr-unit { font-size: 13px; color: var(--text2); }

.gr-arrow {
  font-size: 22px; color: var(--text3);
  margin-left: 12px; flex-shrink: 0;
}

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 64px 40px; text-align: center;
  color: var(--text2); gap: 12px;
}
.empty-state .icon { font-size: 52px; line-height: 1; }
.empty-state p { font-size: 16px; line-height: 1.9; }

/* ── TASK CARDS ── */
.task-list { padding: 16px 20px 40px; }
.task-card {
  background: var(--card);
  border-left: 4px solid #dddddd;
  border-radius: 0 12px 12px 0;
  padding: 16px 16px 16px 18px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: opacity 0.15s;
  min-height: 64px;
}
.task-card[data-urgency="must"] { border-left-color: var(--must); }
.task-card.done-card { opacity: 0.45; border-left-color: #dddddd; cursor: default; }
.task-card:not(.done-card):active { opacity: 0.7; }
.task-card-body { flex: 1; min-width: 0; }
.task-card-title {
  font-size: 17px; font-weight: 500; line-height: 1.5;
  margin-bottom: 4px; word-break: break-word; color: var(--text);
}
.task-card.done-card .task-card-title {
  text-decoration: line-through; color: var(--text2);
}
.task-card-meta { font-size: 13px; color: var(--text2); }

.check-btn {
  width: 44px; height: 44px;
  border-radius: 50%; border: 2px solid var(--border-strong);
  background: none; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .15s; color: transparent;
}
.task-card.done-card .check-btn {
  background: var(--text); border-color: var(--text); color: var(--bg);
}

/* ── FOCUS SCREEN ── */
.focus-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 24px 32px; text-align: center;
  gap: 0;
}
.focus-task-title {
  font-size: 12px; font-weight: 500; color: var(--text2);
  margin-bottom: 12px; line-height: 1.4; word-break: break-word;
  max-width: 100%;
}
/* ステップ一覧ドロワー */
.step-list-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: flex-start;
}
.step-list-sheet {
  width: 100%; background: var(--bg);
  border-radius: 0 0 20px 20px;
  padding: 20px 24px 32px; max-height: 70vh; overflow-y: auto;
}
.step-list-title {
  font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--text2); text-transform: uppercase;
  margin-bottom: 16px; text-align: center;
}
.step-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.step-list-item:last-child { border-bottom: none; }
.step-list-check {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 50%; border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.step-list-item.done .step-list-check {
  background: var(--text); border-color: var(--text); color: var(--bg);
}
.step-list-label {
  font-size: 16px; line-height: 1.45; color: var(--text);
}
.step-list-item.done .step-list-label {
  text-decoration: line-through; color: var(--text2);
}
.focus-step-widget {
  width: 100%; margin-bottom: 16px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 18px; padding: 16px 18px 14px; text-align: left;
}
.focus-step-counter {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: var(--text2); text-transform: uppercase; margin-bottom: 10px;
}
.focus-step-text {
  font-size: 24px; font-weight: 700; line-height: 1.4;
  color: var(--text); margin-bottom: 14px; word-break: break-word;
}
.focus-step-next {
  width: 100%; height: 44px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 50px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.focus-step-next:active { opacity: 0.8; }
.focus-step-done-msg {
  font-size: 15px; font-weight: 700; color: var(--text2);
  text-align: center; padding: 6px 0;
}
.timer-ring-wrap {
  position: relative;
  width: 180px; height: 180px;
  margin-bottom: 20px; flex-shrink: 0;
}
.timer-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  transition: background 0.6s linear;
}
.timer-inner {
  position: absolute;
  inset: 18px;
  background: var(--bg);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.timer-inner:active { opacity: 0.75; }
.timer-display {
  font-size: 44px; font-weight: 700; letter-spacing: 1px;
  line-height: 1; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.timer-display.urgent { color: var(--danger); }
.timer-hint {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text2); margin-top: 6px; text-transform: uppercase;
}
/* 進行方向矢印 SVG オーバーレイ */
.timer-arrow-svg {
  position: absolute; inset: 0;
  pointer-events: none; overflow: visible;
}

/* ── IMPORT BUTTON ── */
.import-wrap {
  padding: 8px 20px 12px;
  display: flex; justify-content: center;
  flex-shrink: 0;
}
.import-btn {
  height: 44px; padding: 0 24px;
  background: none; border: 1.5px solid var(--border-strong);
  border-radius: 50px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; font-weight: 500; color: var(--text2);
  transition: opacity 0.15s;
}
.import-btn:active { opacity: 0.6; }

/* ── TOAST ── */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text); border-radius: 50px; padding: 12px 22px;
  font-size: 14px; font-weight: 700; color: var(--bg);
  z-index: 400; transition: transform .3s cubic-bezier(.34,1.3,.64,1);
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════ SCREEN: MAIN ════ -->
<div class="screen" id="screen-main">
  <div class="main-header">
    <div class="app-title">FocusFlow</div>
    <div class="date-badge" id="dateBadge"></div>
    <div class="version-badge" id="versionBadge"></div>
  </div>

  <div class="time-bar-wrap">
    <div class="time-bar-label">
      <span class="time-bar-remaining">今日の残り <strong id="timeBarRemaining">0.0</strong>h</span>
      <span class="time-bar-total" id="timeBarTotal">/ 0.0h</span>
    </div>
    <div class="time-bar-track">
      <div class="time-bar-fill" id="timeBarFill" style="width:0%"></div>
    </div>
  </div>

  <div class="import-wrap">
    <button class="import-btn" onclick="importFromClipboard()">クリップボードからインポート</button>
  </div>

  <div class="scroll">
    <div class="group-rows" id="mainGroups"></div>
  </div>
</div>

<!-- ════ SCREEN: GROUP DETAIL ════ -->
<div class="screen" id="screen-group">
  <div class="screen-header">
    <button class="back-btn" onclick="goBack('group')">‹</button>
    <div class="header-title" id="groupHeaderTitle"></div>
    <div class="header-sub" id="groupHeaderSub"></div>
  </div>
  <div class="scroll">
    <div class="task-list" id="groupTaskList"></div>
  </div>
</div>

<!-- ════ SCREEN: FOCUS ════ -->
<div class="screen" id="screen-focus">
  <div class="screen-header">
    <button class="back-btn" onclick="goBack('focus')">‹</button>
    <div class="header-title">集中モード</div>
  </div>
  <div class="focus-body">
    <div class="focus-task-title" id="focusTaskTitle"></div>
    <div class="focus-step-widget" id="focusStepWidget" style="display:none"></div>
    <div class="timer-ring-wrap">
      <div class="timer-ring" id="timerRing"></div>
      <!-- ドットSVG：赤弧の先端(r=81、12時位置)に白ドットを置いて回転 -->
      <svg class="timer-arrow-svg" viewBox="0 0 180 180">
        <circle id="timerDot" cx="90" cy="9" r="6"
                fill="white" stroke="#c0392b" stroke-width="2"/>
      </svg>
      <div class="timer-inner" onclick="toggleTimer()">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-hint" id="timerHint">タップで開始</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────
// stepのラベル（新: text / 旧: title / 文字列）
function stepLabel(s) {
  if (typeof s === 'string') return s;
  return s.text || s.title || '';
}
// stepの見積もり分数
function stepMinutes(s) {
  if (!s || typeof s !== 'object') return 0;
  return s.estimatedMinutes || 0;
}
// タスク全体の見積もり（stepsの合計 or t.estimate）
function taskEstimate(t) {
  const fromSteps = (t.steps || []).reduce((sum, s) => sum + stepMinutes(s), 0);
  return fromSteps > 0 ? fromSteps : (t.estimate || 30);
}

// ─── MIGRATION ───────────────────────────────────────────────────
function migrateTasks(list) {
  const urgencyMap  = { must: 'must', want: 'want', idea: 'nice' };
  const priorityMap = { high: 'must', medium: 'want', low: 'nice' };
  return list.map(t => {
    if (!t.id) t.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    t.done    = t.done || false;
    t.urgency = t.urgency || urgencyMap[t.type] || priorityMap[t.priority] || 'want';
    // steps を内部フォーマット（text/done/estimatedMinutes）に統一
    t.steps = (t.steps || []).map(s => typeof s === 'string'
      ? { text: s, done: false, estimatedMinutes: 0 }
      : { text: s.text || s.title || '', done: s.done || false,
          estimatedMinutes: s.estimatedMinutes || 0 });
    t.estimate = taskEstimate(t);
    return t;
  });
}

// ─── VERSION ─────────────────────────────────────────────────────
const APP_VERSION = 'v1.3';

// ─── STATE ───────────────────────────────────────────────────────
let tasks = migrateTasks(JSON.parse(localStorage.getItem('ff-tasks') || '[]'));
let currentUrgency = null;
let focusId        = null;
let timerTotal     = 0;
let timerLeft      = 0;
let timerRunning   = false;
let timerTick      = null;

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const save = () => localStorage.setItem('ff-tasks', JSON.stringify(tasks));
const esc  = s => String(s||'').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const GROUP_CONFIG = [
  { urgency: 'must', title: '今日中に絶対' },
  { urgency: 'want', title: 'できたらやりたい' },
  { urgency: 'nice', title: '余力があれば' },
];

// ─── TOAST ───────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── TIME BAR ────────────────────────────────────────────────────
function calcTimeBar() {
  const totalMin = tasks.reduce((s, t) => s + taskEstimate(t), 0);
  const remMin   = tasks.filter(t => !t.done).reduce((s, t) => s + taskEstimate(t), 0);
  const doneMin  = totalMin - remMin;
  document.getElementById('timeBarRemaining').textContent = (remMin / 60).toFixed(1);
  document.getElementById('timeBarTotal').textContent     = '/ ' + (totalMin / 60).toFixed(1) + 'h';
  document.getElementById('timeBarFill').style.width      =
    (totalMin > 0 ? Math.round(doneMin / totalMin * 100) : 0) + '%';
}

// ─── MAIN SCREEN ─────────────────────────────────────────────────
function renderMain() {
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });
  document.getElementById('versionBadge').textContent = APP_VERSION;
  calcTimeBar();

  const incomplete = tasks.filter(t => !t.done);
  const el = document.getElementById('mainGroups');

  if (!incomplete.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">✓</span><p>すべてのタスクが完了しました！</p></div>`;
    return;
  }

  let html = '';
  GROUP_CONFIG.forEach(({ urgency, title }) => {
    const list   = tasks.filter(t => !t.done && t.urgency === urgency);
    const count  = list.length;
    const estMin = list.reduce((s, t) => s + taskEstimate(t), 0);
    const estStr = count > 0
      ? (estMin >= 60 ? (estMin / 60).toFixed(1) + 'h' : estMin + '分')
      : '';
    const zeroClass  = count === 0 ? ' zero' : '';
    const mustClass  = urgency === 'must' && count > 0 ? ' must-color' : '';
    const clickAttr  = count > 0 ? `onclick="showGroup('${urgency}')"` : '';

    html += `
    <div class="group-row${zeroClass}" ${clickAttr}>
      <div class="gr-label">
        <div class="gr-title${mustClass}">${title}</div>
        ${estStr ? `<div class="gr-est">${estStr}</div>` : ''}
      </div>
      <div class="gr-right">
        <div class="gr-count${mustClass}">${count}</div>
        <div class="gr-unit">件</div>
      </div>
      ${count > 0 ? '<div class="gr-arrow">›</div>' : ''}
    </div>`;
  });

  el.innerHTML = html;
}

// ─── GROUP DETAIL ─────────────────────────────────────────────────
function showGroup(urgency) {
  currentUrgency = urgency;
  const cfg = GROUP_CONFIG.find(g => g.urgency === urgency);
  const list = tasks.filter(t => !t.done && t.urgency === urgency);

  const estMin = list.reduce((s, t) => s + taskEstimate(t), 0);
  const estStr = estMin >= 60 ? (estMin / 60).toFixed(1) + 'h' : estMin + '分';

  document.getElementById('groupHeaderTitle').textContent = cfg.title;
  document.getElementById('groupHeaderSub').textContent   = list.length > 0 ? estStr : '';

  renderGroupList();
  document.getElementById('screen-group').classList.add('visible');
}

function renderGroupList() {
  const list = tasks.filter(t => !t.done && t.urgency === currentUrgency);
  const el   = document.getElementById('groupTaskList');

  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><p>タスクがありません</p></div>`;
    return;
  }
  el.innerHTML = list.map(taskCardHTML).join('');
}

function taskCardHTML(t) {
  return `<div class="task-card" data-urgency="${t.urgency || 'want'}" onclick="selectTask('${t.id}')">
    <div class="task-card-body">
      <div class="task-card-title">${esc(t.title)}</div>
      <div class="task-card-meta">${taskEstimate(t)}分</div>
    </div>
    <button class="check-btn" onclick="event.stopPropagation();toggleDone('${t.id}')">${t.done ? '✓' : ''}</button>
  </div>`;
}

// ─── TASK ACTIONS ─────────────────────────────────────────────────
function selectTask(id) {
  startFocus(id);
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  save();
  renderMain();
  if (currentUrgency) renderGroupList();
}

function addTask(t) {
  tasks.unshift({ id: uid(), done: false, steps: [], createdAt: new Date().toISOString(), ...t });
  save();
}

// ─── FOCUS MODE ───────────────────────────────────────────────────
function startFocus(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  focusId = id;
  stopTimer();

  document.getElementById('timerHint').textContent = 'タップで開始';
  document.getElementById('focusTaskTitle').textContent = t.title;

  // スモールステップ描画（1件ずつ）
  renderCurrentStep();

  // 最初の未完了ステップの estimatedMinutes をタイマーにセット、なければタスク全体の見積もり
  const firstStep = (t.steps || []).find(s => !s.done);
  const mins = (firstStep && stepMinutes(firstStep) > 0) ? stepMinutes(firstStep) : taskEstimate(t);
  timerTotal = mins * 60;
  timerLeft  = timerTotal;
  updateTimerUI();
  document.getElementById('screen-focus').classList.add('visible');
}

function renderCurrentStep() {
  const widget = document.getElementById('focusStepWidget');
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps || t.steps.length === 0) {
    widget.style.display = 'none';
    return;
  }
  const steps = t.steps;
  const total = steps.length;
  // 最初の未完了ステップを探す
  const idx = steps.findIndex(s => !s.done);
  widget.style.display = 'block';

  if (idx === -1) {
    // 全ステップ完了
    widget.innerHTML = `<div class="focus-step-done-msg">✓ すべてのステップ完了</div>`;
    return;
  }
  const step = steps[idx];
  const label = stepLabel(step);
  const mins  = stepMinutes(step);
  const doneCount = steps.filter(s => s.done).length;
  const metaStr = mins > 0 ? `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">${mins}分</div>` : '';
  const btn = timerRunning
    ? `<button class="focus-step-next" onclick="advanceStep()">完了</button>`
    : `<button class="focus-step-start" onclick="startStep()">スタート</button>`;
  widget.innerHTML = `
    <div class="focus-step-counter" onclick="showStepList()" style="cursor:pointer">
      ステップ ${doneCount + 1} / ${total} &#8250;
    </div>
    <div class="focus-step-text">${esc(label)}</div>
    ${metaStr}
    ${btn}`;
}

function showStepList() {
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps) return;
  const items = t.steps.map((s, i) => {
    const done  = typeof s === 'object' ? (s.done || false) : false;
    const label = stepLabel(s);
    const mins  = stepMinutes(s);
    const minsStr = mins > 0 ? ` <span style="font-size:12px;color:var(--text3);margin-left:6px;">${mins}分</span>` : '';
    return `<div class="step-list-item${done ? ' done' : ''}">
      <div class="step-list-check">${done ? '✓' : ''}</div>
      <div class="step-list-label">${esc(label)}${minsStr}</div>
    </div>`;
  }).join('');
  const overlay = document.createElement('div');
  overlay.className = 'step-list-overlay';
  overlay.innerHTML = `<div class="step-list-sheet">
    <div class="step-list-title">すべてのステップ</div>
    ${items}
  </div>`;
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
  document.body.appendChild(overlay);
}

function startStep() {
  if (!timerRunning) toggleTimer(); // タイマースタート
  renderCurrentStep();              // ボタンを「完了」に切り替え
}

function advanceStep() {
  stopTimer();
  const t = tasks.find(t => t.id === focusId);
  if (!t || !t.steps) return;
  const idx = t.steps.findIndex(s => !s.done);
  if (idx === -1) return;
  t.steps[idx].done = true;
  save();
  // 全ステップ完了なら自動でタスク完了
  if (t.steps.every(s => s.done)) {
    renderCurrentStep();
    setTimeout(() => completeTask(), 800);
  } else {
    // 次のステップの estimatedMinutes をタイマーにセット
    const nextStep = t.steps.find(s => !s.done);
    const mins = (nextStep && stepMinutes(nextStep) > 0) ? stepMinutes(nextStep) : taskEstimate(t);
    timerTotal = mins * 60;
    timerLeft  = timerTotal;
    updateTimerUI();
    renderCurrentStep(); // 次のステップを「スタート」ボタンで表示
  }
}

function completeTask() {
  if (focusId) {
    const t = tasks.find(t => t.id === focusId);
    if (t) { t.done = true; save(); toast('✓ タスク完了！'); }
  }
  stopTimer();
  document.getElementById('screen-focus').classList.remove('visible');
  document.getElementById('screen-group').classList.remove('visible');
  focusId = null;
  currentUrgency = null;
  renderMain();
}

function goBack(from) {
  if (from === 'focus') {
    stopTimer();
    document.getElementById('screen-focus').classList.remove('visible');
    focusId = null;
  } else if (from === 'group') {
    document.getElementById('screen-group').classList.remove('visible');
    currentUrgency = null;
    renderMain();
  }
}

// ─── TIMER ────────────────────────────────────────────────────────
function stopTimer() {
  clearInterval(timerTick);
  timerRunning = false;
}

function toggleTimer() {
  const hint = document.getElementById('timerHint');
  if (timerRunning) {
    stopTimer();
    hint.textContent = 'タップで再開';
  } else {
    if (timerLeft <= 0) timerLeft = timerTotal;
    timerRunning = true;
    hint.textContent = 'タップで一時停止';
    timerTick = setInterval(() => {
      timerLeft--;
      updateTimerUI();
      if (timerLeft <= 0) {
        stopTimer();
        hint.textContent = 'タップで開始';
        toast('⏰ 時間になりました！');
      }
    }, 1000);
  }
}

function updateTimerUI() {
  const m   = Math.floor(timerLeft / 60), s = timerLeft % 60;
  const pct = timerTotal > 0 ? (timerLeft / timerTotal * 100) : 0;
  const urgent = timerLeft <= 60 && timerLeft > 0;
  const color  = urgent ? 'var(--danger)' : '#e8553a';
  const track  = '#e8e4de';

  const el = document.getElementById('timerDisplay');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className   = 'timer-display' + (urgent ? ' urgent' : '');

  // 経過分をgray、残り分をredにすることでドットが時計回りに動く
  const elapsed = 100 - pct;
  document.getElementById('timerRing').style.background =
    `conic-gradient(${track} ${elapsed}%, ${color} ${elapsed}%)`;

  const dot = document.getElementById('timerDot');
  if (dot) {
    dot.setAttribute('transform', `rotate(${elapsed * 3.6},90,90)`);
    dot.style.opacity = pct > 1 ? '1' : '0';
  }
}

// ─── PWA ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  // 新しいSWがアクティブになったら自動リロード（キャッシュ更新を即反映）
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ─── INIT ─────────────────────────────────────────────────────────
save();
renderMain();

// クォート正規化（アプリ版Claude対策）
function normalizeQuotes(text) {
  return text
    .replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"')  // 各種ダブルクォート
    .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'")  // 各種シングルクォート
    .replace(/[\uFF02]/g, '"')   // 全角ダブルクォート
    .replace(/[\uFF07]/g, "'");  // 全角シングルクォート
}

// クリップボードからインポート（ボタン押下時）
async function importFromClipboard() {
  // 1. クリップボードを試みる
  let text = '';
  try { text = await navigator.clipboard.readText(); } catch { /* 権限なし → promptへ */ }

  // 2. クリップボードの内容がJSONでなければpromptにフォールバック
  let parsed;
  try {
    parsed = JSON.parse(normalizeQuotes(text));
  } catch {
    text = prompt('JSONを貼り付けてください：');
    if (!text) return;
    text = text.trim();
    try {
      parsed = JSON.parse(normalizeQuotes(text));
    } catch {
      alert('JSONとして読み込めませんでした。');
      return;
    }
  }

  if (!Array.isArray(parsed) || parsed.length === 0) {
    alert('インポートできるタスクがありませんでした。');
    return;
  }

  const urgMap = { must: 'must', want: 'want', idea: 'nice' };
  const priMap = { high: 'must', medium: 'want', low: 'nice' };
  parsed.forEach(t => {
    // steps を内部フォーマット（text/done/estimatedMinutes）に統一
    const steps = (t.steps || []).map(s => typeof s === 'string'
      ? { text: s, done: false, estimatedMinutes: 0 }
      : { text: s.text || s.title || '', done: s.done || false,
          estimatedMinutes: s.estimatedMinutes || 0 });
    const urgency = t.urgency || urgMap[t.type] || priMap[t.priority] || 'want';
    // stepsに見積もりがあればその合計、なければ t.estimate or 30
    const fromSteps = steps.reduce((sum, s) => sum + (s.estimatedMinutes || 0), 0);
    const estimate  = fromSteps > 0 ? fromSteps : (t.estimate || 30);
    addTask({ ...t, urgency, estimate, steps, done: false });
  });
  renderMain();
  toast('✓ ' + parsed.length + '件のタスクをインポートしました');
}
</script>
